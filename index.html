<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Practice Test - Grade 6</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'tex2jax_ignore',
                processHtmlClass: 'tex2jax_process'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --navy-dark: #0f172a;     
            --navy-canvas: #1e293b;   
            --yellow-accent: #b45309; 
            --yellow-hover: #d97706;  
            --text-light: #f8fafc;    
            --text-muted: #94a3b8;    
            --success: #10b981;       
            --error: #ef4444;         
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--navy-dark); color: var(--text-light); display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--navy-canvas); text-align: center; padding: 1.2rem; border-bottom: 2px solid var(--yellow-accent); }
        header h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--yellow-accent); font-weight: 600; }
        
        footer { background: var(--navy-canvas); text-align: center; padding: 2rem 1.5rem; border-top: 2px solid var(--yellow-accent); margin-top: auto; font-size: 1.15rem; font-weight: 700; color: var(--text-light); letter-spacing: 1px; line-height: 1.6; }
        footer .author-line { color: var(--yellow-accent); font-size: 1.3rem; font-weight: 800; margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1000px; width: 100%; margin: auto; padding: 2rem 1rem; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .card { background: var(--navy-canvas); width: 100%; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); border: 2px solid var(--yellow-accent); overflow: hidden; }
        
        .title-screen { display: flex; flex-direction: column; align-items: center; padding: 5.5rem 2rem; text-align: center; position: relative; }
        .badge { background-color: rgba(180, 83, 9, 0.15); color: var(--yellow-accent); padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2rem; display: inline-block; border: 2px solid var(--yellow-accent); }
        .title-screen h1 { font-size: 4rem; color: var(--text-light); font-weight: 900; letter-spacing: -1px; line-height: 1.1; margin-bottom: 0.75rem; }
        .title-screen h2 { font-size: 2.2rem; color: var(--yellow-accent); font-weight: 800; margin-bottom: 3.5rem; }
        
        .test-screen { display: none; padding: 2.5rem; }
        .split-container { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 3rem; min-height: 320px; }
        .left-col { border-right: 2px solid var(--yellow-accent); padding-right: 3rem; display: flex; flex-direction: column; justify-content: center; }
        .right-col { display: flex; flex-direction: column; justify-content: center; gap: 0.85rem; }
        
        .question-text { font-size: 1.35rem; font-weight: 600; color: var(--text-light); line-height: 1.5; }
        .hint-box { margin-top: 1.5rem; padding: 1rem; background: var(--navy-dark); border-left: 4px solid var(--yellow-accent); border-radius: 4px; font-size: 0.95rem; color: var(--text-muted); display: none; line-height: 1.4; border-top: 1px solid rgba(180, 83, 9, 0.2); border-right: 1px solid rgba(180, 83, 9, 0.2); border-bottom: 1px solid rgba(180, 83, 9, 0.2); }
        
        .canvas-container { margin: 1.5rem 0 0.5rem 0; width: 100%; display: none; background: var(--navy-dark); padding: 1rem; border-radius: 8px; border: 1px dashed rgba(180, 83, 9, 0.3); }
        canvas { width: 100%; height: auto; display: block; margin: 0 auto; }

        .shape-sequence-container { display: none; width: 100%; margin: 1.5rem 0; background: var(--navy-dark); padding: 1.5rem; border-radius: 12px; border: 2px dashed rgba(180, 83, 9, 0.4); justify-content: space-around; gap: 1rem; flex-wrap: wrap; }
        .shape-step-box { background: rgba(30, 41, 59, 0.7); padding: 1rem; border-radius: 8px; border: 1px solid rgba(180, 83, 9, 0.2); text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .shape-step-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--yellow-accent); font-weight: 700; margin-bottom: 0.75rem; }
        .shape-grid-display { display: grid; gap: 4px; background: rgba(15, 23, 42, 0.6); padding: 8px; border-radius: 6px; min-height: 80px; align-items: center; justify-content: center; }
        
        .dot-node { width: 14px; height: 14px; background: var(--yellow-accent); border-radius: 50%; box-shadow: 0 0 8px rgba(180, 83, 9, 0.6); }
        .square-node { width: 16px; height: 16px; background: #10b981; border-radius: 3px; border: 1px solid #a7f3d0; }

        .table-container { margin: 1.5rem 0; width: 100%; display: flex; justify-content: center; }
        .math-table { border-collapse: collapse; background: var(--navy-dark); border: 2px solid var(--yellow-accent); border-radius: 6px; overflow: hidden; font-weight: 600; font-size: 1.1rem; text-align: center; }
        .math-table th, .math-table td { padding: 0.75rem 1.5rem; border: 1px solid rgba(180, 83, 9, 0.4); color: var(--text-light); }
        .math-table th { background: rgba(180, 83, 9, 0.15); color: var(--yellow-accent); }

        .btn { padding: 0.9rem 2rem; border: 2px solid var(--yellow-accent); border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--navy-dark); color: var(--yellow-accent); }
        .btn-primary:hover { background: var(--yellow-accent); color: var(--navy-dark); transform: translateY(-1px); }
        .btn-start { background: var(--yellow-accent); color: var(--text-light); padding: 1.2rem 4rem; font-size: 1.25rem; font-weight: 800; border-radius: 50px; border: none; }
        .btn-start:hover { background: var(--yellow-hover); transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(180, 83, 9, 0.5); }
        
        .choice-btn { background: var(--navy-dark); border: 2px solid rgba(180, 83, 9, 0.4); text-align: left; padding: 1.1rem; width: 100%; border-radius: 10px; font-size: 1.05rem; color: var(--text-light); font-weight: 500; transition: all 0.15s ease; cursor: pointer; }
        .choice-btn:hover:not(:disabled) { border-color: var(--yellow-accent); background: rgba(180, 83, 9, 0.05); transform: translateX(2px); }
        .choice-btn.correct { background: #064e3b !important; border-color: var(--success) !important; color: #a7f3d0 !important; font-weight: 600; }
        .choice-btn.incorrect { background: #7f1d1d !important; border-color: var(--error) !important; color: #fca5a5 !important; }

        .controls-bar { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; align-items: center; border-top: 2px solid var(--yellow-accent); padding-top: 2rem; }
        .nav-row { display: flex; gap: 1rem; width: 100%; justify-content: space-between; }
        .pagination { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
        .page-num { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(180, 83, 9, 0.4); background: var(--navy-dark); border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.15s ease; color: var(--text-light); }
        .page-num:hover { border-color: var(--yellow-accent); }
        .page-num.active { background: var(--yellow-accent); color: var(--text-light); border-color: var(--yellow-accent); }
        .page-num.answered { border-color: var(--yellow-accent); background: rgba(180, 83, 9, 0.15); color: var(--yellow-accent); }

        .score-screen { display: none; text-align: center; padding: 4rem 2rem; }
        .score-display { font-size: 4rem; font-weight: 800; color: var(--yellow-accent); margin: 1.5rem 0; letter-spacing: -1px; }
        .btn-stack { display: flex; gap: 1.25rem; justify-content: center; align-items: center; margin-top: 2rem; flex-wrap: wrap; }

        @media (max-width: 850px) {
            .split-container { grid-template-columns: 1fr; gap: 2rem; }
            .left-col { border-right: none; padding-right: 0; border-bottom: 2px solid var(--yellow-accent); padding-bottom: 2rem; }
            .title-screen h1 { font-size: 2.8rem; }
            .title-screen h2 { font-size: 1.75rem; }
            .btn-stack { flex-direction: column; width: 100%; }
            .btn-stack .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h2>Practice Test Generator</h2>
    </header>

    <div class="container">
        <div id="titleScreen" class="card title-screen">
            <span class="badge">Curriculum Assessment</span>
            <h1>Algebra Practice Test</h1>
            <h2>Grade 6</h2>
            <button class="btn btn-start" onclick="startTest()">Start Evaluation</button>
        </div>

        <div id="testScreen" class="card test-screen tex2jax_process">
            <div class="split-container">
                <div class="left-col">
                    <div id="questionNumberDisplay" style="color: var(--yellow-accent); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 0.75rem;">Question 1 of 28</div>
                    <div id="questionText" class="question-text">Loading problem prompt...</div>
                    
                    <div id="canvasContainer" class="canvas-container">
                        <canvas id="balanceCanvas" width="500" height="320"></canvas>
                    </div>

                    <div id="shapeSequenceContainer" class="shape-sequence-container"></div>
                    <div id="tablePlacement" class="table-container"></div>

                    <button class="btn" style="margin-top: 1.5rem; background: var(--navy-dark); font-size: 0.85rem; width: fit-content; padding: 0.5rem 1rem; color: var(--yellow-accent); border: 2px solid var(--yellow-accent);" onclick="toggleHint()">💡 Strategy Hint</button>
                    <div id="hintBox" class="hint-box"></div>
                </div>
                <div class="right-col" id="choicesContainer"></div>
            </div>

            <div class="controls-bar">
                <div class="pagination" id="paginationContainer"></div>
                <div class="nav-row">
                    <button class="btn btn-primary" id="prevBtn" onclick="navigate(-1)">← Back</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)">Continue →</button>
                    <button class="btn btn-primary" id="submitTestBtn" style="border-color: var(--success); color: #51cfa3; display: none;" onclick="showResults()">Submit Final Scores</button>
                </div>
            </div>
        </div>

        <div id="scoreScreen" class="card score-screen">
            <span class="badge">Analysis Completed</span>
            <h1>Performance Analytics</h1>
            <div class="score-display" id="finalScore">0 / 28</div>
            <p id="scoreFeedback" style="margin-bottom: 1.5rem; font-size: 1.15rem; color: var(--text-muted); max-width: 500px; margin-left: auto; margin-right: auto; line-height: 1.5;"></p>
            
            <div class="btn-stack">
                <button class="btn" style="background: var(--yellow-accent); color: var(--text-light); border: none; font-weight: 700; padding: 1rem 2rem;" onclick="restartTest(true)">🔄 Try Again (New Randomized Questions)</button>
                <button class="btn btn-primary" style="padding: 1rem 2rem;" onclick="restartTest(false)">🏠 Go Back (Main Screen)</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="author-line">DELTA MATEMATICA | LUIS RAMOS JR.</div>
        <div>&copy; 2026 Algebra Practice Test Platform. All Rights Reserved.</div>
    </footer>

    <script>
        let baseQuestions = [
            { id: 1, type: "trans1" }, { id: 2, type: "trans2" }, { id: 3, type: "seq1" }, { id: 4, type: "seq2" },
            { id: 5, type: "seq_rule1" }, { id: 6, type: "seq_rule2" }, { id: 7, type: "eq_two1" }, { id: 8, type: "eq_two2" },
            { id: 9, type: "eq_two3" }, { id: 10, type: "eq_one1" }, { id: 11, type: "eq_one2" }, { id: 12, type: "word1" },
            { id: 13, type: "word2" }, { id: 14, type: "scale1" }, { id: 15, type: "scale2" }, { id: 16, type: "seesaw1" },
            { id: 17, type: "seesaw2" }, { id: 18, type: "ineq1" }, { id: 19, type: "ineq2" }, { id: 20, type: "grid1" },
            { id: 21, type: "grid2" }, { id: 22, type: "grid3" }, { id: 23, type: "grid4" }, { id: 24, type: "table1" },
            { id: 25, type: "table2" }, { id: 26, type: "shape_growing_dots" }, { id: 27, type: "shape_growing_squares" }, 
            { id: 28, type: "shape_linear_dots" }
        ];

        let questions = [];
        let currentIdx = 0;
        let userAnswers = [];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function createChoices(correctAns, wrongAnswers) {
            let uniqueWrongs = [...new Set(wrongAnswers)].filter(w => w !== correctAns);
            while(uniqueWrongs.length < 3) {
                // If it looks like math formatting, generate math variations.
                if (correctAns.startsWith('$')) {
                    let fallback = parseInt(correctAns.replace(/[^0-9\-]/g, '')) || 0;
                    let offset = Math.floor(Math.random() * 20) + 1;
                    let item = `$${fallback + (Math.random() > 0.5 ? offset : -offset)}$`;
                    if(item !== correctAns && !uniqueWrongs.includes(item)) uniqueWrongs.push(item);
                } else {
                    // Fallback word mutations if choices aren't purely mathematical
                    uniqueWrongs.push(`Change by ${Math.floor(Math.random() * 10) + 1}`);
                }
            }
            let choiceList = [correctAns, uniqueWrongs[0], uniqueWrongs[1], uniqueWrongs[2]];
            shuffleArray(choiceList);
            return { choices: choiceList, answerIndex: choiceList.indexOf(correctAns) };
        }

        function generateDynamicDataset() {
            let shuffledBlueprints = shuffleArray([...baseQuestions]);

            questions = shuffledBlueprints.map((item) => {
                let variant = Math.floor(Math.random() * 3); 
                
                switch(item.type) {
                    case "trans1": {
                        let dec = Math.floor(Math.random() * 15) + 5;
                        let res = Math.floor(Math.random() * 30) + 20;
                        let variants = [
                            { q: `Write as an equation:<br>A number $y$ decreased by $${dec}$ is $${res}$.`, c: `$y - ${dec} = ${res}$`, w: [`$${dec} - y = ${res}$`, `$y + ${dec} = ${res}$`, `$y \\cdot ${dec} = ${res}$`] },
                            { q: `Write as an equation:<br>The difference of $y$ and $${dec}$ is $${res}$.`, c: `$y - ${dec} = ${res}$`, w: [`$${dec} - y = ${res}$`, `$y + ${dec} = ${res}$`, `$\\frac{y}{${dec}} = ${res}$`] },
                            { q: `Write as an equation:<br>$${dec}$ subtracted from $y$ equals $${res}$.`, c: `$y - ${dec} = ${res}$`, w: [`$y + ${dec} = ${res}$`, `$${dec} - y = ${res}$`, `$${res} - y = ${dec}$`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "trans1", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Decreased by indicates subtraction from the variable." };
                    }
                    case "trans2": {
                        let mul = Math.floor(Math.random() * 8) + 3;
                        let yld = mul * (Math.floor(Math.random() * 9) + 4);
                        let variants = [
                            { q: `Write as an equation:<br>$${mul}$ times a number $x$ is $${yld}$.`, c: `$${mul}x = ${yld}$`, w: [`$${mul} + x = ${yld}$`, `$x - ${mul} = ${yld}$`, `$\\frac{x}{${mul}} = ${yld}$`] },
                            { q: `Write as an equation:<br>The product of $${mul}$ and $x$ is $${yld}$.`, c: `$${mul}x = ${yld}$`, w: [`$${mul} + x = ${yld}$`, `$x \\cdot x = ${yld}$`, `$${mul} - x = ${yld}$`] },
                            { q: `Write as an equation:<br>$x$ multiplied by $${mul}$ equals $${yld}$.`, c: `$${mul}x = ${yld}$`, w: [`$${mul} + x = ${yld}$`, `$\\frac{${mul}}{x} = ${yld}$`, `$x - ${mul} = ${yld}$`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "trans2", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Product and times imply multiplication." };
                    }
                    case "seq1": {
                        let start = Math.floor(Math.random() * 6) + 2;
                        let diff = Math.floor(Math.random() * 5) + 4;
                        let s1 = start, s2 = s1 + diff, s3 = s2 + diff, s4 = s3 + diff, s5 = s4 + diff, s6 = s5 + diff;
                        let variants = [
                            { q: `Find the missing term:<br>$${s1}, ${s2}, ${s3}, \\dots, ${s5}, ${s6}$`, c: `$${s4}$`, w: [`$${s4 - 2}$`, `$${s4 + 1}$`, `$${s4 + 3}$`] },
                            { q: `Find $?$:<br>$${s1}, ${s2}, ${s3}, ?, ${s5}$`, c: `$${s4}$`, w: [`$${s4 + 2}$`, `$${s4 - 1}$`, `$${s4 + 4}$`] },
                            { q: `Complete the sequence:<br>$${s1}, ${s2}, ${s3}, \\underline{\\quad}, ${s5}$`, c: `$${s4}$`, w: [`$${s4 - 3}$`, `$${s4 + 2}$`, `$${s4 + 1}$`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "seq1", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Find the constant number added between successive terms." };
                    }
                    case "seq2": {
                        let diff = Math.floor(Math.random() * 4) + 6;
                        let end = Math.floor(Math.random() * 15) + 20;
                        let s5 = end, s4 = s5 + diff, s3 = s4 + diff, s2 = s3 + diff, s1 = s2 + diff;
                        let variants = [
                            { q: `Find the missing term:<br>$${s1}, ${s2}, ${s3}, \\dots, ${s5}$`, c: `$${s4}$`, w: [`$${s4 - 3}$`, `$${s4 + 2}$`, `$${s4 - 1}$`] },
                            { q: `Find the missing value:<br>$${s1}, ${s2}, ${s3}, \\boxed{\\quad}, ${s5}$`, c: `$${s4}$`, w: [`$${s4 + 3}$`, `$${s4 - 2}$`, `$${s4 + 1}$`] },
                            { q: `Find $?$:<br>$${s1}, ${s2}, ${s3}, ?, ${s5}$`, c: `$${s4}$`, w: [`$${s4 - 4}$`, `$${s4 + 4}$`, `$${s4 - 2}$`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "seq2", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Identify the constant value subtracted at each step." };
                    }
                    case "seq_rule1": {
                        // Plain language operation description instead of an explicit equation
                        let diff = Math.floor(Math.random() * 5) + 3; 
                        let start = Math.floor(Math.random() * 10) + 1;
                        let s1 = start, s2 = s1 + diff, s3 = s2 + diff, s4 = s3 + diff;
                        
                        let variants = [
                            { q: `Identify the pattern rule for this sequence:<br>$${s1}, ${s2}, ${s3}, ${s4}, \\dots$`, c: `Add ${diff}`, w: [`Subtract ${diff}`, `Multiply by ${diff}`, `Add ${diff + 2}`] },
                            { q: `What operation is used to get the next term in the pattern:<br>$${s1}, ${s2}, ${s3}, ${s4}$`, c: `Add ${diff}`, w: [`Add ${diff - 1}`, `Multiply by 2`, `Subtract ${diff}`] },
                            { q: `Find the rule connecting the numbers in this sequence:<br>$${s1}, ${s2}, ${s3}, ${s4}, \\dots$`, c: `Add ${diff}`, w: [`Subtract ${diff}`, `Add ${diff + 1}`, `Multiply by ${diff}`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "seq_rule1", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Look at what you must do to get from one number to the very next number." };
                    }
                    case "seq_rule2": {
                        // Plain language operation description instead of an explicit equation
                        let diff = Math.floor(Math.random() * 4) + 2; 
                        let start = Math.floor(Math.random() * 15) + 30;
                        let s1 = start, s2 = s1 - diff, s3 = s2 - diff, s4 = s3 - diff;
                        
                        let variants = [
                            { q: `Identify the pattern rule for this sequence:<br>$${s1}, ${s2}, ${s3}, ${s4}, \\dots$`, c: `Subtract ${diff}`, w: [`Add ${diff}`, `Subtract ${diff + 1}`, `Divide by ${diff}`] },
                            { q: `What operation is used to get the next term in the pattern:<br>$${s1}, ${s2}, ${s3}, ${s4}$`, c: `Subtract ${diff}`, w: [`Subtract ${diff - 1}`, `Divide by 2`, `Add ${diff}`] },
                            { q: `Find the rule connecting the numbers in this sequence:<br>$${s1}, ${s2}, ${s3}, ${s4}, \\dots$`, c: `Subtract ${diff}`, w: [`Add ${diff}`, `Subtract ${diff + 2}`, `Multiply by 2`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "seq_rule2", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Notice if the numbers are getting larger or smaller, and by how much each time." };
                    }
                    case "eq_two1": {
                        let x = Math.floor(Math.random() * 5) + 3;
                        let co = Math.floor(Math.random() * 3) + 2;
                        let k = Math.floor(Math.random() * 6) + 4;
                        let rhs = co * x + k;
                        let variants = [
                            { q: `Solve for $x$:<br>$$${co}x + ${k} = ${rhs}$$`, c: `$${x}$`, w: [`$${x-1}$`, `$${x+2}$`, `$${x+1}$`] },
                            { q: `Find $x$:<br>$$${co}x + ${k} = ${rhs}$$`, c: `$${x}$`, w: [`$${x-2}$`, `$${x+3}$`, `$${x-1}$`] },
                            { q: `Solve for $x$:<br>$$${co}x + ${k} = ${rhs}$$`, c: `$${x}$`, w: [`$${x+1}$`, `$${x+2}$`, `$${x-1}$`] }
                        ];
                        let active = variants[variant];
                        let setup = createChoices(active.c, active.w);
                        return { type: "eq_two1", q: active.q, c: setup.choices, a: setup.answerIndex, h: "Subtract the constant from both sides first, then divide." };
                    }
                    case "eq_two2": {
                        let x = Math.floor(Math.random() * 6) + 4;
                        let co = Math.floor(Math.random() * 3) + 2;
                        let k = Math.floor(Math.random() * 5) + 3;
                        let rhs = co * x - k;
                        let variants = [
                            { q: `Solve for $x$:<br>$$${co}x - ${k} = ${rhs}$$`, c: `$${x}$`, w: [`$${x+2}$`, `$${x-1}$`, `$${x+1}$`] },

        function startTest() {
            generateDynamicDataset();
            userAnswers = Array(questions.length).fill(null);
            currentIdx = 0;
            document.getElementById('titleScreen').style.display = 'none';
            document.getElementById('scoreScreen').style.display = 'none';
            document.getElementById('testScreen').style.display = 'block';
            buildPagination();
            loadQuestion();
        }

        function loadQuestion() {
            const qData = questions[currentIdx];
            document.getElementById('questionNumberDisplay').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
            document.getElementById('questionText').innerHTML = qData.q;
            document.getElementById('hintBox').innerText = qData.h;
            document.getElementById('hintBox').style.display = 'none';

            const cc = document.getElementById('canvasContainer');
            const tp = document.getElementById('tablePlacement');
            const sc = document.getElementById('shapeSequenceContainer');
            const canvas = document.getElementById('balanceCanvas');
            
            if (qData.type && qData.type.startsWith('grid')) {
                cc.style.display = 'block'; tp.style.display = 'none'; sc.style.display = 'none';
                canvas.height = 320; drawDiagram(qData.type);
            } else if (qData.type && (qData.type.startsWith('scale') || qData.type.startsWith('seesaw'))) {
                cc.style.display = 'block'; tp.style.display = 'none'; sc.style.display = 'none';
                canvas.height = 240; drawDiagram(qData.type);
            } else if (qData.type && qData.type.startsWith('table')) {
                cc.style.display = 'none'; tp.style.display = 'flex'; sc.style.display = 'none';
                buildFunctionTable(qData);
            } else if (qData.type && qData.type.startsWith('shape_visual')) {
                cc.style.display = 'none'; tp.style.display = 'none'; sc.style.display = 'flex';
                buildVectorShapeSequence(qData.type, qData.vars);
            } else {
                cc.style.display = 'none'; tp.style.display = 'none'; sc.style.display = 'none';
            }

            const container = document.getElementById('choicesContainer');
            container.innerHTML = '';

            qData.c.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = choice;
                btn.onclick = () => handleSelect(index);
                
                if (userAnswers[currentIdx] !== null) {
                    btn.disabled = true;
                    if (index === qData.a) btn.classList.add('correct');
                    if (index === userAnswers[currentIdx] && index !== qData.a) btn.classList.add('incorrect');
                }
                container.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentIdx === 0;
            if (currentIdx === questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitTestBtn').style.display = 'inline-flex';
            } else {
                document.getElementById('nextBtn').style.display = 'inline-flex';
                document.getElementById('submitTestBtn').style.display = 'none';
            }
            updatePaginationUI();
            
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise();
            }
        }

        function buildVectorShapeSequence(type, vars) {
            const container = document.getElementById('shapeSequenceContainer');
            container.innerHTML = ''; 
            
            for(let lvl = 1; lvl <= 3; lvl++) {
                const stepBox = document.createElement('div');
                stepBox.className = 'shape-step-box';
                
                const title = document.createElement('div');
                title.className = 'shape-step-title';
                title.innerHTML = `Level $${lvl}$`;
                stepBox.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'shape-grid-display';

                if (type === 'shape_visual_dots') {
                    grid.style.gridTemplateColumns = `repeat(${lvl}, 14px)`;
                    for(let d = 0; d < lvl * lvl; d++) {
                        const dot = document.createElement('div');
                        dot.className = 'dot-node';
                        grid.appendChild(dot);
                    }
                } else if (type === 'shape_visual_squares') {
                    grid.style.gridTemplateColumns = `repeat(3, 16px)`;
                    for(let cell = 0; cell < 9; cell++) {
                        const sq = document.createElement('div');
                        sq.className = 'square-node';
                        if (cell === 4 || (cell === 1 && lvl >= 2) || (cell === 7 && lvl >= 2) || (cell === 3 && lvl >= 3) || (cell === 5 && lvl >= 3)) {
                            grid.appendChild(sq);
                        } else {
                            const empty = document.createElement('div');
                            empty.style.width = '16px'; empty.style.height = '16px';
                            grid.appendChild(empty);
                        }
                    }
                } else if (type === 'shape_visual_line') {
                    let targetNodesCount = 3 * lvl - 1;
                    grid.style.gridTemplateColumns = `repeat(${lvl * 2}, 14px)`;
                    for(let nodeIdx = 0; nodeIdx < targetNodesCount; nodeIdx++) {
                        const dNode = document.createElement('div');
                        dNode.className = 'dot-node';
                        dNode.style.background = '#d97706';
                        grid.appendChild(dNode);
                    }
                }

                stepBox.appendChild(grid);
                container.appendChild(stepBox);
            }
        }

        function buildFunctionTable(qData) {
            const tp = document.getElementById('tablePlacement');
            let m = qData.vars.m;
            let b = qData.vars.b;
            let content = "";
            
            if (qData.type === 'table1') {
                content = `
                    <table class="math-table">
                        <tr><th>Input ($x$)</th><td>$1$</td><td>$2$</td><td>$3$</td><td>$4$</td><td>$5$</td></tr>
                        <tr><th>Output ($y$)</th><td>$${m*1+b}$</td><td>$${m*2+b}$</td><td>$${m*3+b}$</td><td>$${m*4+b}$</td><td>$${m*5+b}$</td></tr>
                    </table>`;
            } else if (qData.type === 'table2') {
                content = `
                    <table class="math-table">
                        <tr><th>Input ($x$)</th><td>$0$</td><td>$1$</td><td>$2$</td><td>$3$</td><td>$4$</td></tr>
                        <tr><th>Output ($y$)</th><td>$${m*0+b}$</td><td>$${m*1+b}$</td><td>$${m*2+b}$</td><td>$${m*3+b}$</td><td>$${m*4+b}$</td></tr>
                    </table>`;
            }
            tp.innerHTML = content;
        }

        function drawDiagram(type) {
            const canvas = document.getElementById('balanceCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            if (type.startsWith('scale')) {
                ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(250, 40); ctx.lineTo(250, 180); ctx.moveTo(200, 180); ctx.lineTo(300, 180); ctx.stroke();
                ctx.strokeStyle = '#b45309'; ctx.beginPath(); ctx.moveTo(80, 60); ctx.lineTo(420, 60); ctx.stroke();
                ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(80, 60); ctx.lineTo(50, 130); ctx.moveTo(80, 60); ctx.lineTo(110, 130);
                ctx.moveTo(420, 60); ctx.lineTo(390, 130); ctx.moveTo(420, 60); ctx.lineTo(450, 130); ctx.stroke();
                ctx.strokeStyle = '#b45309'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(40, 130); ctx.lineTo(120, 130); ctx.moveTo(380, 130); ctx.lineTo(460, 130); ctx.stroke();

                ctx.font = 'italic 14px sans-serif';
                if (type === 'scale1') {
                    drawBlock(ctx, 48, 105, 'x', '#1e293b', '#b45309'); drawBlock(ctx, 70, 105, 'x', '#1e293b', '#b45309'); drawBlock(ctx, 92, 105, 'x', '#1e293b', '#b45309');
                    drawBlock(ctx, 70, 80, '5g', '#0f172a', '#10b981'); drawBlock(ctx, 400, 100, '20g', '#0f172a', '#10b981', 35, 30);
                } else {
                    drawBlock(ctx, 55, 105, 'x', '#1e293b', '#b45309'); drawBlock(ctx, 80, 105, 'x', '#1e293b', '#b45309');
                    drawBlock(ctx, 67, 80, '4kg', '#0f172a', '#10b981'); drawBlock(ctx, 400, 100, '14kg', '#0f172a', '#10b981', 35, 30);
                }
            } else if (type.startsWith('seesaw')) {
                ctx.strokeStyle = '#94a3b8'; ctx.fillStyle = '#334155'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(250, 150); ctx.lineTo(230, 190); ctx.lineTo(270, 190); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.strokeStyle = '#b45309'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(50, 150); ctx.lineTo(450, 150); ctx.stroke();

                ctx.font = 'italic 14px sans-serif';
                if (type === 'seesaw1') {
                    drawBlock(ctx, 90, 120, 'w', '#1e293b', '#b45309'); drawBlock(ctx, 130, 120, '10kg', '#0f172a', '#10b981', 35, 30);
                    drawBlock(ctx, 350, 110, '35kg', '#0f172a', '#10b981', 45, 40);
                } else if (type === 'seesaw2') {
                    drawBlock(ctx, 90, 120, 'x', '#1e293b', '#b45309'); drawBlock(ctx, 130, 120, '15kg', '#0f172a', '#10b981', 35, 30);
                    drawBlock(ctx, 350, 110, '45kg', '#0f172a', '#10b981', 45, 40);
                }
            } else if (type.startsWith('grid')) {
                const centerX = 250, centerY = 160, scale = 22;
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.40)'; ctx.lineWidth = 1;
                for (let i = -11; i <= 11; i++) {
                    ctx.beginPath(); ctx.moveTo(centerX + i * scale, 10); ctx.lineTo(centerX + i * scale, 310); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(centerX - 240, centerY + i * scale); ctx.lineTo(centerX + 240, centerY + i * scale); ctx.stroke();
                }
                ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(centerX - 230, centerY); ctx.lineTo(centerX + 230, centerY); ctx.moveTo(centerX, 10); ctx.lineTo(centerX, 310); ctx.stroke();

                ctx.fillStyle = '#f8fafc'; ctx.font = 'italic 14px sans-serif'; ctx.fillText('x', centerX + 240, centerY); ctx.fillText('y', centerX, 5);
                ctx.font = 'normal 10px sans-serif'; ctx.fillStyle = '#94a3b8';
                for(let i = -10; i <= 10; i++) {
                    if(i === 0) continue;
                    ctx.fillText(i, centerX + i * scale, centerY + 14); ctx.fillText(-i, centerX - 14, centerY + i * scale);
                }

                if (type === 'grid1') { plotPoint(ctx, centerX + 4 * scale, centerY + 3 * scale, 'P', '#b45309'); }
                else if (type === 'grid2') { plotPoint(ctx, centerX, centerY, 'Origin', '#b45309'); }
                else if (type === 'grid3') { plotPoint(ctx, centerX - 2 * scale, centerY - 5 * scale, 'Q', '#b45309'); }
                else if (type === 'grid4') {
                    plotPoint(ctx, centerX + 2 * scale, centerY - 3 * scale, 'A', '#64748b'); plotPoint(ctx, centerX - 2 * scale, centerY - 1 * scale, "A'", '#10b981');
                    ctx.strokeStyle = '#b45309'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
                    ctx.beginPath(); ctx.moveTo(centerX + 2 * scale, centerY - 3 * scale); ctx.lineTo(centerX - 2 * scale, centerY - 1 * scale); ctx.stroke(); ctx.setLineDash([]);
                }
            }
        }

        function drawBlock(ctx, x, y, label, bg, border, w=22, h=25) {
            ctx.fillStyle = bg; ctx.fillRect(x, y, w, h); ctx.strokeStyle = border; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#f8fafc'; ctx.fillText(label, x + (w/2), y + (h/2));
        }

        function plotPoint(ctx, px, py, label, color) {
            ctx.fillStyle = color; ctx.beginPath(); ctx.arc(px, py, 6, 0, 2 * Math.PI); ctx.fill();
            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = '#f8fafc'; ctx.font = 'italic 13px sans-serif'; ctx.fillText(label, px + 15, py - 12);
        }

        function handleSelect(choiceIdx) {
            if (userAnswers[currentIdx] !== null) return; 
            userAnswers[currentIdx] = choiceIdx;
            loadQuestion();
        }

        function toggleHint() {
            const hb = document.getElementById('hintBox');
            hb.style.display = hb.style.display === 'none' ? 'block' : 'none';
        }

        function buildPagination() {
            const pagContainer = document.getElementById('paginationContainer');
            pagContainer.innerHTML = '';
            questions.forEach((_, idx) => {
                const pBtn = document.createElement('div');
                pBtn.className = 'page-num';
                pBtn.innerText = idx + 1;
                pBtn.onclick = () => jumpToQuestion(idx);
                pagContainer.appendChild(pBtn);
            });
        }

        function updatePaginationUI() {
            const elements = document.querySelectorAll('.page-num');
            elements.forEach((el, idx) => {
                el.className = 'page-num';
                if (idx === currentIdx) el.classList.add('active');
                else if (userAnswers[idx] !== null) el.classList.add('answered');
            });
        }

        function jumpToQuestion(idx) { currentIdx = idx; loadQuestion(); }
        function navigate(dir) { 
            currentIdx += dir; 
            if(currentIdx < 0) currentIdx = 0;
            if(currentIdx >= questions.length) currentIdx = questions.length - 1;
            loadQuestion(); 
        }

        function showResults() {
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('scoreScreen').style.display = 'block';
            let totalCorrect = userAnswers.reduce((acc, ans, idx) => acc + (ans === questions[idx].a ? 1 : 0), 0);
            document.getElementById('finalScore').innerText = `${totalCorrect} / ${questions.length}`;
            
            let percentage = (totalCorrect / questions.length) * 100;
            let msg = percentage >= 85 ? "Excellent core concept comprehension!" : "Solid progression work! Review noted strategy hints.";
            document.getElementById('scoreFeedback').innerText = msg;
        }

        function restartTest(shouldMutateDataset) {
            document.getElementById('scoreScreen').style.display = 'none';
            if (shouldMutateDataset) {
                startTest(); 
            } else {
                document.getElementById('titleScreen').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
